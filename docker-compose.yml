
services:

  # --- PostgreSQL database ---
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: tasksdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data    # data survives restarts
    ports:
      - "5432:5432"                               # expose for debugging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Flask application ---
  app:
    build: .                                      # build from your Dockerfile
    environment:
      DB_HOST: postgres                           # service name, not an IP
      DB_PORT: 5432
      DB_NAME: tasksdb
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy                # wait for postgres to be ready
    volumes:
      - .:/app                                    # live code reload during dev

  # --- Nginx reverse proxy ---
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"                                   # world-facing port
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

# Named volumes — data lives here on your server
volumes:
  postgres_data:
